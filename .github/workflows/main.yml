name: Job Isolation Test

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create file
        run: echo "Hello from build job" > test.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-file
          path: test.txt

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-file

      - name: Read file
        run: cat test.txt
